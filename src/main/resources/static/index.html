<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth System</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="page-shell">
  <div class="brand-bar">
    <div>
      <h1>Authify</h1>
      <p>Secure access in one beautiful page.</p>
    </div>
  </div>

  <div class="container">
    <div class="card auth-card">
      <div class="tab-header">
        <button id="loginBtn" class="tab-btn active">Login</button>
        <button id="signupBtn" class="tab-btn">Sign Up</button>
      </div>

      <div class="form-pane active" id="loginPane">
        <h2>Login</h2>
        <p class="panel-text">Access your account and continue quickly.</p>
        <form id="loginForm">
          <input type="email" id="loginEmail" placeholder="Email" required />
          <input type="password" id="loginPassword" placeholder="Password" required />
          <button type="submit" class="primary-btn">Login</button>
          <p id="loginMsg" class="message"></p>
        </form>
      </div>

      <div class="form-pane" id="signupPane">
        <h2>Create Account</h2>
        <p class="panel-text">Start your secure session with a new profile.</p>
        <form id="signupForm">
          <input type="text" id="name" placeholder="Name" required />
          <input type="email" id="signupEmail" placeholder="Email" required />
          <input type="password" id="signupPassword" placeholder="Password" required />
          <button type="submit" class="primary-btn">Sign Up</button>
          <p id="signupMsg" class="message"></p>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="index.js"></script>
</body>
</html>
