<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #0f172a 0%, #020617 55%, #020617 100%);
            color: #e2e8f0;
        }
        .dashboard-card {
            width: min(520px, 90vw);
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.25);
            border-radius: 28px;
            padding: 42px 38px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 36px;
            color: #38bdf8;
        }
        p {
            color: #94a3b8;
            margin: 20px 0 32px;
            line-height: 1.75;
        }
        .email {
            color: #ffffff;
            font-weight: 600;
        }
        .logout-btn {
            padding: 14px 28px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, #22c55e, #0ea5e9);
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(14, 165, 233, 0.28);
        }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <h1>Welcome to the Dashboard!</h1>
        <p>You are logged in as: <span id="userEmail" class="email"></span></p>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <script>
        document.getElementById("userEmail").innerText = localStorage.getItem("user") || "Unknown";

        function logout() {
            localStorage.removeItem("user");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
